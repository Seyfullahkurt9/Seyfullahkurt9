<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">

  <defs>
    <!-- Typing reveal clips: a rect that expands width to reveal text left-to-right -->
    <clipPath id="t1">
      <rect x="20" y="42" width="0" height="24">
        <animate attributeName="width" from="0" to="760" dur="0.9s" begin="0.3s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="t2">
      <rect x="20" y="94" width="0" height="24">
        <animate attributeName="width" from="0" to="760" dur="1.1s" begin="2s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="t3">
      <rect x="20" y="234" width="0" height="24">
        <animate attributeName="width" from="0" to="760" dur="1s" begin="4.8s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="t4">
      <rect x="20" y="300" width="0" height="24">
        <animate attributeName="width" from="0" to="760" dur="0.5s" begin="6.8s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- ═══ Window Frame ═══ -->
  <rect width="800" height="340" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Title Bar -->
  <rect width="800" height="36" rx="12" fill="#161b22"/>
  <rect y="24" width="800" height="12" fill="#161b22"/>
  <line x1="0" y1="36" x2="800" y2="36" stroke="#30363d" stroke-width="1"/>

  <!-- Traffic Lights -->
  <circle cx="22" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="6" fill="#febc2a"/>
  <circle cx="62" cy="18" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="400" y="23" font-family="'SF Mono','Cascadia Code','Fira Code','Courier New',monospace" font-size="13" fill="#8b949e" text-anchor="middle">seyfullah@dev: ~/about-me</text>

  <!-- ═══ Line 1: whoami (typed) ═══ -->
  <g clip-path="url(#t1)">
    <text x="20" y="58" font-family="'SF Mono','Cascadia Code','Courier New',monospace" font-size="14">
      <tspan fill="#3fb950" font-weight="bold">seyfullah@dev</tspan><tspan fill="#6e7681">:</tspan><tspan fill="#58a6ff">~</tspan><tspan fill="#6e7681">$ </tspan><tspan fill="#e6edf3">whoami</tspan>
    </text>
  </g>

  <!-- Line 2: whoami output -->
  <text x="20" y="80" font-family="'SF Mono','Cascadia Code','Courier New',monospace" font-size="14" fill="#e6edf3" opacity="0">
    Seyfullah Kurt | Full-Stack Developer
    <animate attributeName="opacity" from="0" to="1" dur="0.12s" begin="1.4s" fill="freeze"/>
  </text>

  <!-- ═══ Line 3: cat skills.json (typed) ═══ -->
  <g clip-path="url(#t2)">
    <text x="20" y="110" font-family="'SF Mono','Cascadia Code','Courier New',monospace" font-size="14">
      <tspan fill="#3fb950" font-weight="bold">seyfullah@dev</tspan><tspan fill="#6e7681">:</tspan><tspan fill="#58a6ff">~</tspan><tspan fill="#6e7681">$ </tspan><tspan fill="#e6edf3">cat skills.json</tspan>
    </text>
  </g>

  <!-- JSON output { -->
  <text x="20" y="132" font-family="'SF Mono','Cascadia Code','Courier New',monospace" font-size="14" fill="#6e7681" opacity="0">
    {<animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="3.3s" fill="freeze"/>
  </text>

  <!-- "languages" -->
  <text x="20" y="154" font-family="'SF Mono','Cascadia Code','Courier New',monospace" font-size="14" opacity="0">
    <tspan fill="#6e7681">  </tspan><tspan fill="#7ee787">"languages"</tspan><tspan fill="#6e7681">: [</tspan><tspan fill="#a5d6ff">"PHP"</tspan><tspan fill="#6e7681">, </tspan><tspan fill="#a5d6ff">"JS"</tspan><tspan fill="#6e7681">, </tspan><tspan fill="#a5d6ff">"TS"</tspan><tspan fill="#6e7681">, </tspan><tspan fill="#a5d6ff">"Python"</tspan><tspan fill="#6e7681">],</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="3.5s" fill="freeze"/>
  </text>

  <!-- "frameworks" -->
  <text x="20" y="176" font-family="'SF Mono','Cascadia Code','Courier New',monospace" font-size="14" opacity="0">
    <tspan fill="#6e7681">  </tspan><tspan fill="#7ee787">"frameworks"</tspan><tspan fill="#6e7681">: [</tspan><tspan fill="#a5d6ff">"WooCommerce"</tspan><tspan fill="#6e7681">, </tspan><tspan fill="#a5d6ff">"Next.js"</tspan><tspan fill="#6e7681">, </tspan><tspan fill="#a5d6ff">"React"</tspan><tspan fill="#6e7681">],</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="3.7s" fill="freeze"/>
  </text>

  <!-- "platforms" -->
  <text x="20" y="198" font-family="'SF Mono','Cascadia Code','Courier New',monospace" font-size="14" opacity="0">
    <tspan fill="#6e7681">  </tspan><tspan fill="#7ee787">"platforms"</tspan><tspan fill="#6e7681">:  [</tspan><tspan fill="#a5d6ff">"ikas"</tspan><tspan fill="#6e7681">, </tspan><tspan fill="#a5d6ff">"Vercel"</tspan><tspan fill="#6e7681">, </tspan><tspan fill="#a5d6ff">"AWS"</tspan><tspan fill="#6e7681">, </tspan><tspan fill="#a5d6ff">"Cloudflare"</tspan><tspan fill="#6e7681">]</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="3.9s" fill="freeze"/>
  </text>

  <!-- JSON } -->
  <text x="20" y="220" font-family="'SF Mono','Cascadia Code','Courier New',monospace" font-size="14" fill="#6e7681" opacity="0">
    }<animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="4.1s" fill="freeze"/>
  </text>

  <!-- ═══ Line: echo $STATUS (typed) ═══ -->
  <g clip-path="url(#t3)">
    <text x="20" y="250" font-family="'SF Mono','Cascadia Code','Courier New',monospace" font-size="14">
      <tspan fill="#3fb950" font-weight="bold">seyfullah@dev</tspan><tspan fill="#6e7681">:</tspan><tspan fill="#58a6ff">~</tspan><tspan fill="#6e7681">$ </tspan><tspan fill="#e6edf3">echo $CURRENT_STATUS</tspan>
    </text>
  </g>

  <!-- Status outputs -->
  <text x="20" y="272" font-family="'SF Mono','Cascadia Code','Courier New',monospace" font-size="14" fill="#e6edf3" opacity="0">
    [*] Building B2B/B2C e-commerce systems
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="6s" fill="freeze"/>
  </text>
  <text x="20" y="294" font-family="'SF Mono','Cascadia Code','Courier New',monospace" font-size="14" fill="#e6edf3" opacity="0">
    [*] Open to collaboration
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="6.2s" fill="freeze"/>
  </text>

  <!-- ═══ Final prompt (typed) ═══ -->
  <g clip-path="url(#t4)">
    <text x="20" y="316" font-family="'SF Mono','Cascadia Code','Courier New',monospace" font-size="14">
      <tspan fill="#3fb950" font-weight="bold">seyfullah@dev</tspan><tspan fill="#6e7681">:</tspan><tspan fill="#58a6ff">~</tspan><tspan fill="#6e7681">$ </tspan>
    </text>
  </g>

  <!-- Blinking cursor -->
  <rect x="160" y="303" width="9" height="16" rx="1" fill="#3fb950" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.5;0.7" dur="1.1s" begin="7.5s" repeatCount="indefinite"/>
  </rect>

</svg>
